name: rsvp_reader
description: RSVP speed reader for EPUB files
version: 1.0.0+1
publish_to: none

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  epubx: ^4.0.0
  shared_preferences: ^2.5.5
  path_provider: ^2.1.5
  file_picker: ^8.1.7
  crypto: ^3.0.3
  html: ^0.15.4
  collection: ^1.19.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
