name: rsvp_reader
description: RSVP speed reader for EPUB files
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  epubx: ^4.0.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  file_picker: ^8.0.3
  volume_controller: ^2.0.6
  crypto: ^3.0.3
  html: ^0.15.4
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
